<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#f4f7fa">
<meta name="mobile-web-app-capable" content="yes">
<meta name="format-detection" content="telephone=no">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --slate-50: #f8fafc; --slate-100: #f1f5f9; --slate-200: #e2e8f0;
    --slate-300: #cbd5e1; --slate-400: #94a3b8; --slate-500: #64748b;
    --slate-600: #475569; --slate-700: #334155; --slate-800: #1e293b; --slate-900: #0f172a;
    --accent: #6366f1; --accent-dim: #4f46e5; --danger: #ef4444;
    --amber: #f59e0b; --emerald: #10b981;
    --green: #10b981; --green-bg: #f0fdf4;
    --amber-bg: #fefce8; --red-bg: #fef2f2; --purple-bg: #f3e8ff;
    --accent-light: #eef2ff;
    --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    --font-mono: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
    --radius: 12px; --shadow: 0 1px 3px rgba(0,0,0,0.06);
    --bg: var(--slate-50); --surface: #fff; --border: var(--slate-200);
    --text: var(--slate-800); --text-dim: var(--slate-500); --text-faint: var(--slate-400);
  }
  html { font-size: 15px; }
  body {
    font-family: var(--font); background: var(--bg); color: var(--text);
    line-height: 1.6; padding: 0;
  }
  .app { max-width: 1280px; margin: 0 auto; padding: 2rem 1.5rem; }
  @media (min-width: 768px) { .app { padding: 3rem 2.5rem; } }

  /* ─── Header ─── */
  .header { margin-bottom: 2rem; padding-bottom: 1.5rem; border-bottom: 1px solid var(--border); }
  .header h1 { font-size: 1.75rem; font-weight: 700; letter-spacing: -0.02em; color: var(--slate-900); }
  .header h1 small { font-size: 0.65rem; font-weight: 400; color: var(--text-dim); display: block; margin-top: 0.1rem; }
  .header h1 span { color: var(--accent); }
  .header .meta { margin-top: 0.5rem; color: var(--text-dim); font-size: 0.85rem; display: flex; gap: 1.5rem; flex-wrap: wrap; }
  .badge-date { font-size: 0.7rem; font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; padding: 0.2rem 0.65rem; border-radius: 999px; background: var(--accent); color: #fff; white-space: nowrap; }
  .subtitle { font-size: 0.72rem; color: var(--text-faint); margin-top: 0.3rem; }
  .nav-links { display: flex; gap: 1.5rem; margin-top: 0.75rem; flex-wrap: wrap; }
  .nav-links a { font-size: 0.8rem; color: var(--accent); text-decoration: none; font-weight: 500; }
  .nav-links a:hover { text-decoration: underline; }
  .section-nav { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 0.75rem 1rem; margin-bottom: 2rem; }
  .section-nav ul { list-style: none; display: flex; flex-wrap: wrap; gap: 0.25rem 0.75rem; }
  .section-nav a { font-size: 0.78rem; color: var(--accent); text-decoration: none; font-weight: 500; }
  .section-nav a:hover { text-decoration: underline; }
  .note { font-size: 0.82rem; color: var(--text-dim); background: var(--slate-50); border-radius: 6px; padding: 0.6rem 0.8rem; margin-bottom: 1rem; border-left: 3px solid var(--slate-300); }
  .compact { list-style: none; padding: 0; }
  .compact li { padding: 0.15rem 0; font-size: 0.82rem; }
  .compact li::before { content: '·'; margin-right: 0.4rem; color: var(--text-faint); }
  .lit-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; margin-bottom: 1.5rem; }
  .lit-card h3, .lit-card h4 { margin-top: 1rem; }
  .lit-card h3:first-child, .lit-card h4:first-child { margin-top: 0; }

  /* ─── Card ─── */
  .card {
    background: var(--surface); border-radius: var(--radius);
    border: 1px solid var(--border); padding: 1.5rem;
    margin-bottom: 1.5rem; box-shadow: var(--shadow);
  }
  .card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.04); }
  .card-exclude { border-left: 4px solid var(--danger); background: #fef2f2; border-color: #fecaca; border-style: solid; }
  .card-exclude h4 { background: #b91c1c; color: #fff; display: inline-block; padding: 0.2rem 0.7rem; border-radius: 6px; }
  .card-allowed { border-left: 4px solid var(--emerald); background: #f0fdf4; border-color: #bbf7d0; }
  .card-amber { border-left: 4px solid var(--amber); background: var(--amber-bg); }
  .card-vagus { border-left: 4px solid #a78bfa; background: #f5f3ff; }
  .card-grid { display: grid; grid-template-columns: 1fr; gap: 1rem; margin-bottom: 1.5rem; }
  @media (min-width: 768px) { .card-grid { grid-template-columns: 1fr 1fr; } }
  @media (min-width: 1100px) { .card-grid { grid-template-columns: 1fr 1fr; } }
  .card-title {
    font-size: 0.85rem; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.04em; color: var(--text-faint);
    display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1rem;
  }
  .tag, .card .tag { display: inline-block; font-size: 0.65rem; font-weight: 500; padding: 0.08rem 0.4rem; border-radius: 999px; letter-spacing: 0.02em; white-space: nowrap; }
  .tag-purple { background: var(--purple-bg); color: #6a4a8a; }

  /* ─── Entity Map ─── */
  .emap { }
  .emap-row { display: flex; align-items: center; gap: 0; margin-bottom: 0; position: relative; padding: 0.15rem 0; }
  .emap-lvl { flex: 1; padding: 0.45rem 0.7rem; border-radius: 6px; font-size: 0.78rem; font-weight: 500; border: 1px solid var(--border); background: var(--surface); }
  .emap-lvl.l1 { background: #fef2f2; border-color: #fecaca; }
  .emap-lvl.l2 { background: #fff7ed; border-color: #fed7aa; }
  .emap-lvl.l3 { background: #fefce8; border-color: #fde68a; }
  .emap-lvl.l4 { background: #f0fdf4; border-color: #bbf7d0; }
  .emap-lvl.l5 { background: #eef2ff; border-color: #c7d2fe; }
  .emap-lvl.l6 { background: #faf5ff; border-color: #e9d5ff; }
  .emap-arrow { padding: 0 0.35rem; font-size: 0.7rem; color: var(--text-faint); }
  .emap-int { padding: 0.3rem 0.6rem; border-radius: 6px; font-size: 0.68rem; font-weight: 600; white-space: nowrap; border: 1px solid var(--border); background: var(--surface); cursor: help; margin-left: 0.25rem; transition: all 0.15s; }
  .emap-int:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.1); transform: translateY(-1px); }
  .emap-int.vagus { border-color: #a78bfa; color: #6d28d9; background: #f5f3ff; }
  .emap-int.cbt { border-color: #60a5fa; color: #1e40af; background: #eff6ff; }
  .emap-int.sleep { border-color: #818cf8; color: #3730a3; background: #eef2ff; }
  .emap-int.mc { border-color: #34d399; color: #047857; background: #ecfdf5; }
  .emap-int.diet { border-color: #fbbf24; color: #92400e; background: #fffbeb; }
  .emap-int.barrier { border-color: #60a5fa; color: #1e40af; background: #eff6ff; }
  .emap-int.vrt { border-color: #f472b6; color: #9d174d; background: #fdf2f8; }

  /* ─── Rec blocks (MC card) ─── */
  .rec-stack { display: flex; flex-direction: column; gap: 1rem; margin-bottom: 1rem; }
  .rec-block { margin-bottom: 0.8rem; }
  .rec-block h3 { font-size: 0.82rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--slate-700); }
  .rec-block .sub { font-size: 0.65rem; font-weight: 400; color: var(--text-faint); }
  .mc-accent { display: inline-block; padding: 0.1rem 0.4rem; border-radius: 4px; background: var(--green); color: #fff; font-size: 0.6rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }
  .card-mc { border-left: 4px solid var(--emerald); }
  .dd { font-size: 0.82rem; padding: 0.15rem 0; color: var(--text); line-height: 1.5; }
  .do { color: var(--emerald); font-weight: 600; }
  .dont { color: var(--danger); font-weight: 600; }

  /* ─── Table ─── */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
  thead th {
    text-align: left; padding: 0.65rem 0.75rem; font-weight: 600; font-size: 0.75rem;
    text-transform: uppercase; letter-spacing: 0.03em; color: var(--text-faint);
    border-bottom: 2px solid var(--border); white-space: nowrap;
  }
  tbody td { padding: 0.6rem 0.75rem; border-bottom: 1px solid var(--slate-100); vertical-align: top; }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover { background: var(--slate-50); }
  .strain-table { font-size: 0.78rem; margin-top: 0.75rem; }
  .strain-table th { font-size: 0.6rem; }
  .strain-table td, .strain-table th { padding: 0.4rem 0.5rem; }
  .strain-table tr td:first-child { white-space: nowrap; }
  .strain-table .tag { font-size: 0.55rem; }

  /* ─── Tag / Status ─── */
  .tag-green { background: #f0fdf4; color: #15803d; }
  .tag-amber { background: #fefce8; color: #a16207; }
  .tag-yellow { background: #fefce8; color: #a16207; }
  .tag-red { background: #fef2f2; color: #b91c1c; }
  .tag-blue { background: #f0f9ff; color: #0369a1; }
  .tag-hpa { background: #fef2f2; color: #991b1b; }
  .tag-mc { background: #f0fdf4; color: #166534; }
  .tag-vestibular { background: #eef2ff; color: #1e40af; }
  .tag-uterine { background: #fdf2f8; color: #9d174d; }
  .tag-gut { background: #fffbeb; color: #92400e; }
  .tag-skeletal { background: #f5f3ff; color: #5b21b6; }
  .status { display: flex; align-items: center; gap: 0.4rem; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  .status-dot.green { background: var(--emerald); }
  .status-dot.yellow { background: var(--amber); }
  .status-dot.red { background: var(--danger); }

  /* ─── Grid ─── */
  .grid-2 { display: grid; grid-template-columns: 1fr; gap: 1.5rem; margin-bottom: 1.5rem; }
  @media (min-width: 768px) { .grid-2 { grid-template-columns: 1fr 1fr; } }
  .grid-3 { display: grid; grid-template-columns: 1fr; gap: 1.5rem; margin-bottom: 1.5rem; }
  @media (min-width: 768px) { .grid-3 { grid-template-columns: 1fr 1fr; } }
  @media (min-width: 1100px) { .grid-3 { grid-template-columns: 1fr 1fr 1fr; } }

  /* ─── Hypothesis, Rec steps ─── */
  .hypothesis { margin-bottom: 0.75rem; }
  .hypothesis:last-child { margin-bottom: 0; }
  .hypothesis .h-title { font-weight: 600; font-size: 0.9rem; }
  .hypothesis .h-title .prob { font-weight: 400; font-size: 0.75rem; color: var(--text-dim); }
  .hypothesis .h-body { font-size: 0.82rem; color: var(--text-dim); margin-top: 0.15rem; }
  .rec-step { display: flex; gap: 0.75rem; align-items: flex-start; padding: 0.6rem 0; border-bottom: 1px solid var(--slate-100); }
  .rec-step:last-child { border-bottom: none; }
  .rec-num { display: inline-flex; align-items: center; justify-content: center; width: 1.5rem; height: 1.5rem; border-radius: 50%; background: var(--accent); color: #fff; font-size: 0.7rem; font-weight: 700; flex-shrink: 0; }
  .rec-num.danger { background: var(--danger); }
  .rec-num.amber { background: var(--amber); }
  .rec-body { font-size: 0.85rem; }
  .rec-body strong { color: var(--slate-900); }

  /* ─── Misc ─── */
  .lang-bar { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1rem; flex-wrap: wrap; }
  .lang-bar label { font-size: 0.65rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; color: var(--text-faint); white-space: nowrap; }
  .lang-select { font-size: 0.78rem; padding: 0.25rem 0.5rem; border-radius: 6px; border: 1px solid var(--border); background: var(--surface); color: var(--text); cursor: pointer; font-family: var(--font); }
  .lang-select:focus { outline: none; border-color: var(--accent); }
  .footer { margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid var(--border); font-size: 0.75rem; color: var(--text-faint); text-align: center; }
  hr { border: none; border-top: 1px solid var(--border); margin: 1rem 0; }
  .questions li { padding: 0.4rem 0; font-size: 0.85rem; color: var(--text-dim); border-bottom: 1px solid var(--slate-100); }
  .questions li:last-child { border-bottom: none; }
  .questions li::marker { color: var(--accent); }
  .dos-donts { display: grid; grid-template-columns: 1fr 1fr; gap: 0.25rem; font-size: 0.82rem; }
  .dos-donts .do { color: var(--emerald); }
  .dos-donts .dont { color: var(--danger); }

  @media print {
    .lang-bar, .footer { display: none; }
    .card { break-inside: avoid; box-shadow: none; border: 1px solid #ddd; }
  }

  /* ─── Dependency Graph ─── */
  .graph-container {
    width: 100%; height: 500px;
    border: 1px solid var(--border); border-radius: var(--radius);
    background: var(--surface); margin-bottom: 2rem;
    position: relative; overflow: hidden;
  }
  .graph-container .vis-network { outline: none; }

  /* ─── Node Cards ─── */
  .node-grid { grid-template-columns: 1fr; }
  @media (min-width: 768px) { .node-grid { grid-template-columns: 1fr 1fr; } }
  @media (min-width: 1100px) { .node-grid { grid-template-columns: 1fr 1fr 1fr; } }
  .node-card { display: flex; flex-direction: column; gap: 0.5rem; }
  .node-card-header { display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; }
  .node-card-header .node-emoji { font-size: 1.4rem; line-height: 1; }
  .node-card-header strong { font-size: 0.95rem; }
  .node-card-header .tag { font-size: 0.6rem; }
  .graph-btn {
    margin-left: auto; padding: 0.2rem 0.5rem;
    font-size: 0.75rem; background: var(--slate-100);
    border: 1px solid var(--border); border-radius: 6px;
    color: var(--text-dim); cursor: pointer; transition: all 0.15s;
    font-family: var(--font);
  }
  .graph-btn:hover { background: var(--accent-light); color: var(--accent); border-color: var(--accent); }
  .node-what { font-size: 0.82rem; color: var(--text-dim); line-height: 1.5; }
  .node-links { font-size: 0.78rem; display: flex; flex-direction: column; gap: 0.15rem; }
  .node-links a { color: var(--accent); text-decoration: none; }
  .node-links a:hover { text-decoration: underline; }
  .link-out { color: var(--emerald); }
  .link-in { color: var(--accent-dim); }
  .node-do { font-size: 0.8rem; padding: 0.5rem 0.7rem; background: var(--slate-50); border-radius: 6px; border-left: 3px solid var(--emerald); }

  /* ─── Tabs ─── */
  .food-tabs { display: flex; gap: 0; margin-bottom: 1.5rem; border-bottom: 2px solid var(--slate-200); }
  .food-tab { padding: 0.5rem 1.2rem; font-size: 0.8rem; font-weight: 600; border: none; background: transparent; color: var(--text-faint); cursor: pointer; font-family: var(--font); border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.15s; }
  .food-tab:hover { color: var(--text); }
  .food-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .food-tab-content { display: none; }
  .food-tab-content.active { display: block; }
  .estro-info { background: #f5f3ff; border: 1px solid #e4d5f7; border-radius: var(--radius); padding: 1.2rem; margin-bottom: 1.5rem; font-size: 0.85rem; line-height: 1.6; }
  .estro-info h4 { margin-top: 0; color: #6d28d9; }
  .estro-info p { margin: 0.5rem 0; }

  /* ─── Food Guide ─── */
  .food-filter { display: flex; gap: 0.5rem; margin-bottom: 1rem; flex-wrap: wrap; }
  .food-btn { padding: 0.35rem 0.8rem; font-size: 0.75rem; border: 1px solid var(--border); border-radius: 999px; background: var(--surface); color: var(--text-dim); cursor: pointer; font-family: var(--font); transition: all 0.15s; }
  .food-btn:hover { border-color: var(--accent); color: var(--accent); }
  .food-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .food-grid { display: grid; grid-template-columns: 1fr; gap: 1rem; margin-bottom: 1.5rem; }
  @media (min-width: 768px) { .food-grid { grid-template-columns: 1fr 1fr; } }
  .food-card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 1.2rem; box-shadow: var(--shadow); }
  .food-card-header { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.5rem; }
  .food-card-header .emoji { font-size: 1.3rem; }
  .food-card-header .name { font-weight: 600; font-size: 0.95rem; }
  .food-card-header .cat { font-size: 0.6rem; color: var(--text-faint); background: var(--slate-100); padding: 0.1rem 0.4rem; border-radius: 999px; }
  .food-tags { display: flex; gap: 0.35rem; margin-left: auto; }
  .food-tag { font-size: 0.55rem; padding: 0.1rem 0.35rem; border-radius: 4px; font-weight: 600; text-transform: uppercase; }
  .food-tag.sighi { background: #ecfdf5; color: #166534; }
  .food-tag.fodmap { background: #fffbeb; color: #92400e; }
  .food-tag.fodmap-y { background: #fef2f2; color: #b91c1c; }
  .food-label { font-size: 0.65rem; font-weight: 600; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.03em; margin-top: 0.6rem; margin-bottom: 0.15rem; }
  .food-body { font-size: 0.78rem; color: var(--text-dim); line-height: 1.5; }
  .food-source { font-size: 0.65rem; color: var(--text-faint); margin-top: 0.5rem; padding-top: 0.4rem; border-top: 1px solid var(--slate-100); }
  .estro-body { border-left: 3px solid #a78bfa; padding-left: 0.5rem; background: #f5f3ff; border-radius: 0 4px 4px 0; }
  .comp-badge { font-size: 0.55rem; padding: 0.1rem 0.4rem; border-radius: 4px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.03em; }
  .comp-badge.gut { background: #e0f2fe; color: #075985; }
  .comp-badge.repro { background: #fce7f3; color: #9d174d; }
  .comp-badge.both { background: #ecfdf5; color: #065f46; }
  .cycle-badge { font-size: 0.55rem; padding: 0.1rem 0.4rem; border-radius: 4px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.03em; }
  .cycle-badge.follicular { background: #fce7f3; color: #9d174d; }
  .cycle-badge.luteal { background: #ede9fe; color: #5b21b6; }
  .cycle-badge.menstrual { background: #fef2f2; color: #991b1b; }
  .cycle-badge.both { background: #f1f5f9; color: #475569; }
  .food-prep-row { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-top: 0.7rem; padding-top: 0.5rem; border-top: 1px solid var(--slate-100); }
  .food-prep-item { font-size: 0.72rem; padding: 0.2rem 0.5rem; border-radius: 6px; background: var(--slate-50); color: var(--text-dim); line-height: 1.4; }
  .ru-badge { font-size: 0.55rem; padding: 0.1rem 0.4rem; border-radius: 4px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.03em; }
  .ru-badge.seas { background: #fffbeb; color: #92400e; }
  .ru-badge.lim { background: #fff7ed; color: #9a3412; }
  .ru-badge.rare { background: #fef2f2; color: #991b1b; }
  .food-ru-alt { font-size: 0.7rem; margin-top: 0.5rem; padding: 0.35rem 0.5rem; background: #f1f5f9; border-radius: 6px; color: var(--text-dim); line-height: 1.4; border-left: 3px solid var(--accent); }
</style>

</head>
